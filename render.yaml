services:
  # The Spring Boot Application
  - type: web
    name: url-shortener-app
    env: docker
    plan: free # Use 'starter' if you want a paid plan
    region: ohio
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: DB_HOST
        fromDatabase:
          name: url-shortener-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: url-shortener-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: url-shortener-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: url-shortener-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: url-shortener-db
          property: password
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"

databases:
  # PostgreSQL Database
  - name: url-shortener-db
    databaseName: urlshortener
    user: urlshortener_user
    plan: free
    region: ohio
